<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>WF · 404 — *</title>
<link rel="stylesheet" href="wireframe.css">
<script defer src="chrome.js"></script>
</head>
<body data-wf-title="404 — Not Found" data-wf-route="*">
<main>
  <section class="wf-hero wf-hero--dark wf-center" style="min-height:70vh;display:flex;align-items:center">
    <div class="wf-container">
      <div style="font-size:120px;font-weight:800;color:#4a5056;line-height:1">404</div>
      <div class="wf-pill" style="display:inline-block;margin:8px 0 16px">Seite nicht gefunden</div>
      <div class="wf-h1">Oops! Diese Seite existiert nicht</div>
      <p class="wf-lead" style="margin:16px auto 28px">Platzhalter — Beschreibung (1 Zeile).</p>
      <a class="wf-btn wf-btn--solid wf-btn--lg">⌂ Zurück zur Startseite</a>

      <div style="margin-top:48px">
        <span class="wf-tag" style="background:transparent;color:#9aa1a8">Beliebte Seiten</span>
        <div class="wf-pill-row" style="justify-content:center">
          <span class="wf-pill">⌂ Startseite</span>
          <span class="wf-pill">◧ IglooPro</span>
          <span class="wf-pill">▤ Services</span>
          <span class="wf-pill">✉ Kontakt</span>
        </div>
      </div>
    </div>
  </section>
</main>
</body>
</html>
