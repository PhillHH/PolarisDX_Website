# polaris-newlook-home.yaml — v2: STARTSEITE im präzisen PHILIPS-MEDICAL-SYSTEMS-Brief,
# FOTOGRAFIE-FORWARD mit echten/lizenzfreien Bildern. Mutiger als v1 (kein zaghaftes Token-Tweaking).
# Logo + Navy/Blau-Markenfarben + Inhalte/Claims BLEIBEN. Nur Startseite + Header/Footer. Kein Merge/Deploy.
name: polaris-newlook-home
description: >
  Startseite + Header/Footer im präzisen Philips-Healthcare-Brief: weiß, großer Foto-Hero, starke
  Typo-Hierarchie, Zielgruppen-Nav, modulare Full-Width-Bänder — mit echten PolarisDX-Fotos + verifizierten
  lizenzfreien Stocks. Logo + Markenfarben + Inhalte bleiben. Kein Merge, kein Deploy.
nodes:
  - id: design_home
    model: opus
    loop:
      prompt: |
        Du bist Lead-Designer einer Premium-Medtech-Agentur. Gestalte die STARTSEITE (+ Header/Navigation/
        Footer) der PolarisDX-Seite KOMPLETT NEU, FOTOGRAFIE-FORWARD, nach einem PRÄZISEN VORBILD —
        Philips Healthcare / Siemens Healthineers. Sei MUTIG: das ist kein Token-Tweak, Layout & Hero werden
        neu erfunden. Aktualisiere docs/NEWLOOK-HOME.md (Konzept) und arbeite konsistent darauf hin.

        PHILIPS-BRIEF (aus der echten Philips-Healthcare-Seite analysiert — verbindlich):
        - GRUNDTON: viel WEISS, dunkler Charcoal/Navy-Text, Markenfarbe Navy/Blau NUR als dezenter Akzent
          (Links, dünne Linien, kleine Flächen). Klarheit statt Drama. Großer Section-Rhythmus (py-24/28/32),
          modulare FULL-WIDTH-Bänder mit viel Weißraum dazwischen, contained Lesebreite für Text.
        - HERO: GROSSES, echtes FOTO (Mensch/Klinik) dominiert (~60-70% above-the-fold), dazu MINIMALER,
          ruhiger Text (große Display-H1 + ein Satz Subline + EIN klarer CTA). Aspirational, ruhig, kein Slider.
        - TYPO: moderne Sans (Inter), STARKER Größen-/Gewichtskontrast — H1 sehr groß (clamp ~40→72) fett,
          Body leicht; Hierarchie über Größe, nicht Farbe.
        - HEADER: hell (weiß/Blur), DUNKLES Logo; Nav NACH ZIELGRUPPE gegliedert — "Für Praxen / Fachkreise"
          vs "Privatkunden" (Consumer) als zwei klare Stränge (Philips-Segment-Logik) + Sprache rechts.
        - KARTEN/GRID: einheitliche Karten, BILD-OBEN, 2/3-Spalten-Grid, ruhige Lucide-Icons, dünne 1px-Linien.
        - CTAs: zurückhaltend (klare aber ruhige Buttons/Text-Links), kein Conversion-Druck.
        - WIRKUNG: professionell, vertrauenswürdig, zugänglich.

        BILDER — DAS IST DER HEBEL (fotografie-forward!), nutze ECHTE Bilder, keine leeren Platzhalter:
        - Eigene PolarisDX-Assets GROSS einsetzen: IglooPro-Gerät (email/assets/igloo_front.png,
          hero_device.png, Igloo-pro-frontal.png) und hero_doctor.png. Kopiere die benötigten nach
          public/images/ und binde sie web-optimiert ein (große, freigestellte Produkt-/Personenbilder).
        - Für große Hero-/Section-Fotos (Klinik/Praxis/Labor/Diagnostik/Fachkraft), wo kein eigenes passt,
          nutze diese VERIFIZIERTEN lizenzfreien Unsplash-Bilder (CSP img-src https: ist erlaubt), je mit
          Query "?w=2000&q=80&auto=format&fit=crop" (bzw. kleinere Breite je Slot):
            https://images.unsplash.com/photo-1579684385127-1ef15d508118
            https://images.unsplash.com/photo-1576091160550-2173dba999ef
            https://images.unsplash.com/photo-1505751172876-fa1923c5c528
            https://images.unsplash.com/photo-1581595219315-a187dd40c322
            https://images.unsplash.com/photo-1559757148-5c350d0d3c56
            https://images.unsplash.com/photo-1530026405186-ed1f139313f8
            https://images.unsplash.com/photo-1551601651-2a8555f1a136
            https://images.unsplash.com/photo-1631815588090-d4bfec5b1ccb
            https://images.unsplash.com/photo-1612349317150-e413f6a5b16d
            https://images.unsplash.com/photo-1666214280557-f1b5022eb634
          Dokumentarisch/authentisch (Menschen/Klinik > Glamour). Setze loading/sizes/alt sauber.
        - Markiere im Konzept/PR, welche Bilder Stock sind und durch EIGENE Fotos ersetzt werden sollten
          ("ASSUMPTION — needs owned photography").

        HART BEHALTEN: PolarisDX-Logo, primäre Markenfarben (Navy #052740 / Blau #0d527f), alle Inhalte/
        Texte/Claims/Preise (Wording darf selbstbewusst-medtech geschärft werden, keine Fakten erfinden/streichen).
        Technik: Stack bleibt (Vite/React-SSR, Tailwind, Tokens), SSR-sicher (kein window beim Render),
        WCAG 2.2 AA, responsive sm/md/lg/xl, alle UI-States, prefers-reduced-motion. Nach jeder Einheit
        build/typecheck/lint GRÜN. Wenn Startseite + Header/Footer im neuen Philips-Look (mit echten Bildern)
        fertig und grün sind, antworte exakt HOME_NEWLOOK_DONE.
      until: HOME_NEWLOOK_DONE
      fresh_context: true
      max_iterations: 25
  - id: validate
    depends_on: [design_home]
    bash: |
      set -e
      npm install --no-audit --no-fund
      npm run build && npm run typecheck && npm run lint
